<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Clienti Fontel — Accesso (G1/C1)</title>
    <meta name="description" content="Accesso area clienti Fontel per codici SIC che iniziano con G1 o C1." />
    <link rel="icon" type="image/svg+xml" href="assets/fontel-logo.svg" />

    <!-- Tipografia: Barlow Semi Condensed (heading) + Geist (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <a href="#main" class="skip">Vai al contenuto principale</a>

    <main class="page" id="main">
      <div class="container">
        <!-- Brand -->
        <header class="brand">
          <img src="assets/fontel-logo.svg" alt="Logo Fontel" />
          <h1>Area <span class="accent">Clienti</span></h1>
          <p>Codice SIC che inizia con G1 o con C1</p>
        </header>

        <!-- Avatar -->
        <div class="avatar" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>

        <!-- Form -->
        <form id="loginForm" class="card" novalidate aria-labelledby="form-title">
          <h2 id="form-title" class="sr-only" style="position:absolute;left:-9999px;">Modulo di accesso</h2>

          <div
            id="successAlert"
            class="alert-success"
            role="status"
            aria-live="polite"
          >
            Accesso effettuato con successo.
          </div>

          <div class="field">
            <label for="account">Account</label>
            <input
              id="account"
              name="account"
              type="text"
              placeholder="Inserisci il tuo account"
              autocomplete="username"
              aria-describedby="err-account"
            />
            <span id="err-account" class="error-msg" role="alert"></span>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Inserisci la password"
                autocomplete="current-password"
                aria-describedby="err-password"
              />
              <button
                type="button"
                class="toggle-pwd"
                id="togglePwd"
                aria-label="Mostra password"
                aria-pressed="false"
              >
                <svg id="iconEye" width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span id="err-password" class="error-msg" role="alert"></span>
          </div>

          <div class="row">
            <a href="#" class="link">Password dimenticata?</a>
            <button type="submit" class="btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              Accedi
            </button>
          </div>
        </form>

        <div class="register">
          <p>Primo accesso?</p>
          <a href="#">Clicca qui per registrarti</a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        var form = document.getElementById('loginForm');
        var account = document.getElementById('account');
        var password = document.getElementById('password');
        var errAccount = document.getElementById('err-account');
        var errPassword = document.getElementById('err-password');
        var success = document.getElementById('successAlert');
        var toggle = document.getElementById('togglePwd');

        function setError(input, errEl, message) {
          if (message) {
            input.setAttribute('aria-invalid', 'true');
            errEl.textContent = message;
            errEl.classList.add('visible');
          } else {
            input.removeAttribute('aria-invalid');
            errEl.textContent = '';
            errEl.classList.remove('visible');
          }
        }

        toggle.addEventListener('click', function () {
          var isPwd = password.type === 'password';
          password.type = isPwd ? 'text' : 'password';
          toggle.setAttribute('aria-pressed', String(isPwd));
          toggle.setAttribute('aria-label', isPwd ? 'Nascondi password' : 'Mostra password');
        });

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          success.classList.remove('visible');

          var hasError = false;
          if (!account.value.trim()) {
            setError(account, errAccount, 'Inserisci il tuo account.');
            hasError = true;
          } else {
            setError(account, errAccount, '');
          }

          if (!password.value) {
            setError(password, errPassword, 'Inserisci la password.');
            hasError = true;
          } else {
            setError(password, errPassword, '');
          }

          if (hasError) {
            (document.querySelector('[aria-invalid="true"]') || account).focus();
            return;
          }

          success.classList.add('visible');
          success.focus && success.focus();
          form.reset();
        });
      })();
    </script>
  </body>
</html>
